<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#20262d">
  <link rel="manifest" href="{{ url_for('static', filename='manifest.webmanifest') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='quadpod.css') }}">
  <title>{% block title %}Quadpod{% endblock %}</title>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div>
        <div class="brand">APEC Quadpod</div>
        <div class="small muted">v{{ app_version }}</div>
      </div>
      <nav class="nav">
        <a href="{{ url_for('home') }}">Job</a>
        <a href="{{ url_for('pretest') }}">Test</a>
        <a href="{{ url_for('archive') }}">Archive</a>
        <a href="{{ url_for('setup_check') }}">Setup</a>
        <a href="{{ url_for('network') }}">Net</a>
      </nav>
    </div>
  </header>
  <main class="shell">
    {% block content %}{% endblock %}
  </main>
  <div id="installPrompt" class="install-prompt" hidden>
    <strong>Add Quadpod to Home Screen</strong>
    <div class="small">Open Quadpod faster from the field tablet or phone.</div>
    <div class="btnrow">
      <button class="success" type="button" id="installAccept">Add</button>
      <button class="secondary" type="button" id="installDismiss">Later</button>
    </div>
  </div>
  <script>
    window.QUADPOD_CSRF_TOKEN = "{{ csrf_token }}";
    function quadpodJsonHeaders() {
      return {
        "Content-Type": "application/json",
        "X-CSRF-Token": window.QUADPOD_CSRF_TOKEN
      };
    }
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("{{ url_for('static', filename='service-worker.js') }}");
    }
    const installPrompt = document.getElementById("installPrompt");
    const standalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone;
    const localInstallHost = ["localhost", "127.0.0.1", "::1"].includes(window.location.hostname);
    let deferredInstallPrompt = null;
    if (standalone || localInstallHost || localStorage.getItem("quadpod-install-dismissed") === "yes") {
      installPrompt.hidden = true;
    }
    window.addEventListener("beforeinstallprompt", (event) => {
      if (standalone || localInstallHost) return;
      event.preventDefault();
      deferredInstallPrompt = event;
      installPrompt.hidden = false;
    });
    document.getElementById("installAccept").addEventListener("click", async () => {
      if (!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt();
      await deferredInstallPrompt.userChoice;
      deferredInstallPrompt = null;
      installPrompt.hidden = true;
    });
    document.getElementById("installDismiss").addEventListener("click", () => {
      localStorage.setItem("quadpod-install-dismissed", "yes");
      installPrompt.hidden = true;
    });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
