{% extends "base.html" %}
{% block title %}Job Setup{% endblock %}

{% block content %}
<h1 class="page-title">Job Setup</h1>
<form method="POST">
  <section class="section">
    <h2>Project</h2>
    <div class="grid">
      <div class="field full"><label>Project Name</label><input name="project_name" required></div>
      <div class="field full"><label>Project Address</label><input name="project_address" required></div>
      <div class="field"><label>City, State, Zip</label><input name="project_city_state_zip"></div>
      <div class="field"><label>Contact Phone</label><input name="contact_phone" inputmode="tel"></div>
      <div class="field"><label>Date</label><input name="date" type="date" value="{{ defaults.date }}" required></div>
      <div class="field"><label>Date of Suspected Loss</label><input name="suspected_loss_date" type="date"></div>
      <div class="field"><label>Job #</label><input name="job_number" required></div>
      <div class="field"><label>Building #</label><input name="building_number"></div>
      <div class="field"><label>Start Time</label><input name="start_time" type="time"></div>
      <div class="field"><label>End Time</label><input name="end_time" type="time"></div>
    </div>
  </section>

  <section class="section">
    <h2>People</h2>
    <div class="grid">
      <div class="field"><label>Foreman</label><input name="foreman" required></div>
      <div class="field"><label>Tech 1</label><input name="tech_1"></div>
      <div class="field"><label>Tech 2</label><input name="tech_2"></div>
      <div class="field"><label>Client</label><input name="client_name"></div>
      <div class="field full"><label>Client Address</label><input name="client_address"></div>
      <div class="field"><label>Client City, State, Zip</label><input name="client_city_state_zip"></div>
      <div class="field"><label>Client Phone</label><input name="client_phone" inputmode="tel"></div>
      <div class="field"><label>Involved Party 1</label><input name="involved_party_1_name"></div>
      <div class="field"><label>Involved Party 1 Phone</label><input name="involved_party_1_phone" inputmode="tel"></div>
      <div class="field full"><label>Involved Party 1 Address</label><input name="involved_party_1_address"></div>
      <div class="field"><label>Involved Party 1 City, State, Zip</label><input name="involved_party_1_city_state_zip"></div>
      <div class="field"><label>Involved Party 2</label><input name="involved_party_2_name"></div>
      <div class="field"><label>Involved Party 2 Phone</label><input name="involved_party_2_phone" inputmode="tel"></div>
      <div class="field full"><label>Involved Party 2 Address</label><input name="involved_party_2_address"></div>
      <div class="field"><label>Involved Party 2 City, State, Zip</label><input name="involved_party_2_city_state_zip"></div>
    </div>
  </section>

  <section class="section">
    <h2>Equipment & Calibration</h2>
    <div class="grid">
      <div class="field"><label>Air Flow Meter #</label><input name="air_flow_meter_id"></div>
      <div class="field"><label>Air Flow Meter Calibration Date</label><input name="air_flow_meter_calibration_date" type="date"></div>
      <div class="field"><label>Load Cell #</label><input name="load_cell_id" required></div>
      <div class="field"><label>Load Cell Calibration Date</label><input name="load_cell_calibration_date" type="date" required></div>
      <div class="field"><label>IR Temp Gun #</label><input name="ir_temp_gun_id" required></div>
      <div class="field"><label>IR Temp Gun Calibration Date</label><input name="ir_temp_gun_calibration_date" type="date" required></div>
    </div>
    <div class="checkline"><input id="cal" name="calibration_verified" type="checkbox" required><label for="cal">All equipment is within calibration date.</label></div>
  </section>

  <section class="section">
    <h2>Weather & Safety</h2>
    <div class="grid">
      <div class="field"><label>Humidity (%)</label><input name="humidity_percent" type="number" step="0.1" inputmode="decimal"></div>
      <div class="field"><label>Barometric Pressure (inHg)</label><input name="barometric_pressure_inhg" type="number" step="0.01" inputmode="decimal"></div>
      <div class="field full"><label>Weather Notes</label><textarea name="weather_notes"></textarea></div>
    </div>
    <div class="checkline"><input id="weather" name="weather_checked" type="checkbox" required><label for="weather">Weather forecast and unsafe conditions checked.</label></div>
    <div class="checkline"><input id="occupants" name="occupants_notified" type="checkbox"><label for="occupants">Property occupants notified if required.</label></div>
    <div class="checkline"><input id="safety" name="safety_acknowledged" type="checkbox" required><label for="safety">Roof work safety and PPE responsibilities acknowledged.</label></div>
  </section>

  <button class="full-width success" type="submit">Proceed to Test Setup</button>
</form>
{% endblock %}
