{% extends "base.html" %}
{% block title %}Job Setup{% endblock %}

{% block content %}
<h1 class="page-title">Job Setup</h1>
<form method="POST">
  <section class="section">
    <h2>Project</h2>
    <div class="grid">
      <div class="field full"><label>Project Name</label><input name="project_name" value="{{ defaults.get('project_name', '') }}" required></div>
      <div class="field full"><label>Project Address</label><input name="project_address" value="{{ defaults.get('project_address', '') }}" required></div>
      <div class="field"><label>City, State, Zip</label><input name="project_city_state_zip" value="{{ defaults.get('project_city_state_zip', '') }}"></div>
      <div class="field"><label>Contact Phone</label><input name="contact_phone" value="{{ defaults.get('contact_phone', '') }}" inputmode="tel"></div>
      <div class="field"><label>Date</label><input name="date" type="date" value="{{ defaults.date }}" required></div>
      <div class="field"><label>Date of Suspected Loss</label><input name="suspected_loss_date" type="date" value="{{ defaults.get('suspected_loss_date', '') }}"></div>
      <div class="field"><label>Job #</label><input name="job_number" value="{{ defaults.get('job_number', '') }}" required></div>
      <div class="field"><label>Building #</label><input name="building_number" value="{{ defaults.get('building_number', '') }}"></div>
      <div class="field"><label>Start Time</label><input name="start_time" type="time" value="{{ defaults.get('start_time', '') }}"></div>
      <div class="field"><label>End Time</label><input name="end_time" type="time" value="{{ defaults.get('end_time', '') }}"></div>
    </div>
  </section>

  <section class="section">
    <h2>People</h2>
    <div class="grid">
      <div class="field"><label>Foreman</label><input name="foreman" value="{{ defaults.get('foreman', '') }}" required></div>
      <div class="field"><label>Tech 1</label><input name="tech_1" value="{{ defaults.get('tech_1', '') }}"></div>
      <div class="field"><label>Tech 2</label><input name="tech_2" value="{{ defaults.get('tech_2', '') }}"></div>
      <div class="field"><label>Client</label><input name="client_name" value="{{ defaults.get('client_name', '') }}"></div>
      <div class="field full"><label>Client Address</label><input name="client_address" value="{{ defaults.get('client_address', '') }}"></div>
      <div class="field"><label>Client City, State, Zip</label><input name="client_city_state_zip" value="{{ defaults.get('client_city_state_zip', '') }}"></div>
      <div class="field"><label>Client Phone</label><input name="client_phone" value="{{ defaults.get('client_phone', '') }}" inputmode="tel"></div>
      <div class="field"><label>Involved Party 1</label><input name="involved_party_1_name" value="{{ defaults.get('involved_party_1_name', '') }}"></div>
      <div class="field"><label>Involved Party 1 Phone</label><input name="involved_party_1_phone" value="{{ defaults.get('involved_party_1_phone', '') }}" inputmode="tel"></div>
      <div class="field full"><label>Involved Party 1 Address</label><input name="involved_party_1_address" value="{{ defaults.get('involved_party_1_address', '') }}"></div>
      <div class="field"><label>Involved Party 1 City, State, Zip</label><input name="involved_party_1_city_state_zip" value="{{ defaults.get('involved_party_1_city_state_zip', '') }}"></div>
      <div class="field"><label>Involved Party 2</label><input name="involved_party_2_name" value="{{ defaults.get('involved_party_2_name', '') }}"></div>
      <div class="field"><label>Involved Party 2 Phone</label><input name="involved_party_2_phone" value="{{ defaults.get('involved_party_2_phone', '') }}" inputmode="tel"></div>
      <div class="field full"><label>Involved Party 2 Address</label><input name="involved_party_2_address" value="{{ defaults.get('involved_party_2_address', '') }}"></div>
      <div class="field"><label>Involved Party 2 City, State, Zip</label><input name="involved_party_2_city_state_zip" value="{{ defaults.get('involved_party_2_city_state_zip', '') }}"></div>
    </div>
  </section>

  <section class="section">
    <h2>Equipment & Calibration</h2>
    <div class="grid">
      <div class="field"><label>Air Flow Meter #</label><input name="air_flow_meter_id" value="{{ defaults.get('air_flow_meter_id', '') }}"></div>
      <div class="field"><label>Air Flow Meter Calibration Date</label><input name="air_flow_meter_calibration_date" type="date" value="{{ defaults.get('air_flow_meter_calibration_date', '') }}"></div>
      <div class="field"><label>Load Cell #</label><input name="load_cell_id" value="{{ defaults.get('load_cell_id', '') }}" required></div>
      <div class="field"><label>Load Cell Calibration Date</label><input name="load_cell_calibration_date" type="date" value="{{ defaults.get('load_cell_calibration_date', '') }}" required></div>
      <div class="field"><label>IR Temp Gun #</label><input name="ir_temp_gun_id" value="{{ defaults.get('ir_temp_gun_id', '') }}" required></div>
      <div class="field"><label>IR Temp Gun Calibration Date</label><input name="ir_temp_gun_calibration_date" type="date" value="{{ defaults.get('ir_temp_gun_calibration_date', '') }}" required></div>
    </div>
  </section>

  <section class="section">
    <h2>Conditions</h2>
    <div class="grid">
      <div class="field"><label>Humidity (%)</label><input name="humidity_percent" type="number" step="0.1" value="{{ defaults.get('humidity_percent', '') }}" inputmode="decimal"></div>
      <div class="field"><label>Barometric Pressure (inHg)</label><input name="barometric_pressure_inhg" type="number" step="0.01" value="{{ defaults.get('barometric_pressure_inhg', '') }}" inputmode="decimal"></div>
      <div class="field full"><label>Weather Notes</label><textarea name="weather_notes">{{ defaults.get('weather_notes', '') }}</textarea></div>
    </div>
  </section>

  <button class="full-width success" type="submit">Proceed to Test Setup</button>
</form>
{% endblock %}
