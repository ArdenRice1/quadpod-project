{% extends "base.html" %}
{% block title %}Arm Controls{% endblock %}

{% block content %}
<h1 class="page-title">Arm Operator Controls</h1>

<section class="section">
  <h2>Operator PIN</h2>
  {% if error %}<div class="status bad">{{ error }}</div>{% endif %}
  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <div class="grid">
      <div class="field full"><label>PIN</label><input name="pin" type="password" inputmode="numeric" autocomplete="off" required autofocus></div>
    </div>
    <button class="full-width success" type="submit">Arm Controls</button>
  </form>
</section>

<section class="section">
  <h2>Status</h2>
  <div class="status warn">Jog, tare, and start pull are locked until controls are armed for this browser session.</div>
  <a class="button secondary full-width" href="{{ url_for('setup_check') }}">Back to Setup Check</a>
</section>
{% endblock %}
